<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- A tag <title> define o título que aparece na aba do navegador -->
    <title>Meus sites favoritos</title>
</head>
<body>
    <!-- A tag <h1> cria um título principal dentro da página -->
    <h1>Meus sites favoritos: Roseli</h1>

    <!-- Cada bloco abaixo representa um site favorito -->

    <!-- YouTube -->
    <h1>YouTube</h1> <!-- Nome do site em destaque -->
    <!-- A tag <a> cria um link. O atributo href indica o endereço do site.
         O atributo target="_blank" faz o link abrir em uma nova aba -->
    <a href="https://www.youtube.com" target="_blank">
        <!-- A tag <img> insere uma imagem. O atributo src indica o arquivo da imagem.
             O atributo alt é um texto alternativo caso a imagem não carregue.
             O atributo width define a largura da imagem -->
        <img src="youtube.png" alt="YouTube" width="200">
    </a>
    <!-- A tag <p> cria um parágrafo. Dentro dele, outro <a> com o link em texto -->
    <p><a href="https://www.youtube.com" target="_blank">Visite o YouTube</a></p>

    <!-- Wikipedia -->
    <h1>Wikipedia</h1>
    <a href="https://www.wikipedia.org" target="_blank">
        <img src="wikipedia.png" alt="Wikipedia" width="200">
    </a>
    <p><a href="https://www.wikipedia.org" target="_blank">Visite a Wikipedia</a></p>

    <!-- Khan Academy -->
    <h1>Khan Academy</h1>
    <a href="https://pt.khanacademy.org" target="_blank">
        <img src="khanacademy.png" alt="Khan Academy" width="200">
    </a>
    <p><a href="https://pt.khanacademy.org" target="_blank">Visite a Khan Academy</a></p>

    <!-- GitHub -->
    <h1>GitHub</h1>
    <a href="https://github.com" target="_blank">
        <img src="github.png" alt="GitHub" width="200">
    </a>
    <p><a href="https://github.com" target="_blank">Visite o GitHub</a></p>

    <!-- MDN Docs -->
    <h1>MDN Docs</h1>
    <a href="https://developer.mozilla.org" target="_blank">
        <img src="mdn.png" alt="MDN Docs" width="200">
    </a>
    <p><a href="https://developer.mozilla.org" target="_blank">Visite o MDN Docs</a></p>
</body>
</html>
